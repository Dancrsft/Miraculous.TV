<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miraculous TV - Temporada 6</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1d20; color: white; margin: 0; padding: 0; }
        header { background-color: #111416; padding: 20px; text-align: center; position: relative; border-bottom: 2px solid #00f2ff; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.15); }
        header h1 { margin: 0; font-size: 28px; color: #fff; }
        header p { margin: 5px 0 0 0; font-size: 16px; color: #00f2ff; opacity: 0.9; }
        .btn-volver { position: absolute; top: 25px; left: 20px; color: white; text-decoration: none; font-weight: bold; background-color: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid rgba(0, 242, 255, 0.3); }
        .btn-volver:hover { background-color: rgba(0, 242, 255, 0.2); }
        .contenedor-reproductor { display: flex; max-width: 1250px; margin: 30px auto; gap: 20px; padding: 0 20px; flex-wrap: wrap; }
        .pantalla-video { flex: 2; min-width: 350px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .pantalla-video h2 { margin: 20px 0 10px 0; font-size: 24px; color: #00f2ff; }
        .pantalla-video p { color: #adb5bd; line-height: 1.5; font-size: 15px; }
        .lista-capitulos { flex: 1; min-width: 300px; background-color: #111416; border-radius: 12px; padding: 15px; max-height: 580px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .lista-capitulos h3 { margin-top: 0; border-bottom: 1px solid #2a2f35; padding-bottom: 10px; font-size: 18px; color: #fff; }
        .capitulo-item { display: flex; gap: 15px; padding: 10px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: background-color 0.2s; }
        .capitulo-item:hover { background-color: #22272c; }
        .capitulo-item.activo { background-color: #00f2ff; }
        .capitulo-item.activo h4 { color: #000 !important; }
        .capitulo-item.activo p { color: #222 !important; }
        .capitulo-item img { width: 120px; height: 70px; object-fit: cover; border-radius: 6px; }
        .capitulo-info h4 { margin: 0 0 5px 0; font-size: 14px; color: #fff; }
        .capitulo-info p { margin: 0; font-size: 12px; color: #ced4da; }
        .lista-capitulos::-webkit-scrollbar { width: 6px; }
        .lista-capitulos::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 4px; }
    </style>
</head>
<body>

<header>
  <h1>Miraculous TV</h1>
  <p>Temporada 6 — Capítulos Oficiales</p>
  <a href="#" class="btn-volver" target="_parent">← Volver al Inicio</a>
</header>

<main class="contenedor-reproductor">
  <section class="pantalla-video">
    <div class="video-container">
      <iframe id="reproductor-principal" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
    <h2 id="titulo-video">Capítulo 1</h2>
    <p id="sinopsis-video">Escribe aquí la sinopsis o resumen del primer capítulo de la S6...</p>
  </section>

  <section class="lista-capitulos">
    <h3>Episodios S6</h3>
    
    <div class="capitulo-item activo" data-video="https://www.youtube.com/embed/dQw4w9WgXcQ" data-titulo="Capítulo 1" data-sinopsis="Resumen del primer capítulo de la S6...">
      <img src="https://picsum.photos/120/70?random=61" alt="S6E1">
      <div class="capitulo-info"><h4>1. Capítulo 1</h4><p>22 min</p></div>
    </div>

    <div class="capitulo-item" data-video="https://www.youtube.com/embed/dQw4w9WgXcQ" data-titulo="Capítulo 2" data-sinopsis="Sinopsis del capítulo 2...">
      <img src="https://picsum.photos/120/70?random=62" alt="S6E2">
      <div class="capitulo-info"><h4>2. Capítulo 2</h4><p>22 min</p></div>
    </div>
  </section>
</main>

<script>
  const reproductor = document.getElementById('reproductor-principal');
  const tituloVideo = document.getElementById('titulo-video');
  const sinopsisVideo = document.getElementById('sinopsis-video');
  const capitulos = document.querySelectorAll('.capitulo-item');

  capitulos.forEach(capitulo => {
    capitulo.addEventListener('click', () => {
      document.querySelector('.capitulo-item.activo').classList.remove('activo');
      capitulo.classList.add('activo');
      reproductor.src = capitulo.getAttribute('data-video');
      tituloVideo.textContent = capitulo.getAttribute('data-titulo');
      sinopsisVideo.textContent = capitulo.getAttribute('data-sinopsis');
    });
  });
</script>
</body>
</html>
